<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 Diamond Top Up</title>
    <style>
        body { background: #0f0c29; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1a1a2e; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid #e94560; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #e94560; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; background: #16213e; color: white; }
        button { background: #e94560; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>💎 Diamond Shop</h2>
    <input type="text" id="uid" placeholder="Enter UID">
    <input type="text" id="zone" placeholder="Enter Zone ID">
    <select id="dia">
        <option value="86">86 Diamonds</option>
        <option value="172">172 Diamonds</option>
        <option value="257">257 Diamonds</option>
        <option value="514">514 Diamonds</option>
    </select>
    <button onclick="sendOrder()">Order တင်မည်</button>
</div>

<script>
    const TOKEN = "8955077459:AAFPdw1agBBO7JUN5LDXAPFHaeHcizbDGes";
    const CHAT_ID = "6797159836";

    async function sendOrder() {
        let uid = document.getElementById('uid').value;
        let zone = document.getElementById('zone').value;
        let dia = document.getElementById('dia').value;

        if(!uid || !zone) return alert("UID နဲ့ Zone ID ဖြည့်ပေးပါ!");

        let msg = `💎 *New Order Received*%0A%0A` +
                  `👤 *UID:* ${uid}%0A` +
                  `📍 *Zone:* ${zone}%0A` +
                  `💰 *Package:* ${dia} Diamonds`;

        try {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${msg}&parse_mode=Markdown`);
            alert("Order တင်တာ အောင်မြင်ပါတယ်!");
        } catch(e) { alert("Error ဖြစ်သွားပါတယ် မောင်..."); }
    }
</script>
</body>
</html>
